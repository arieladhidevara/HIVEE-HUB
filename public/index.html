<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hivee-Hub for Docker</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar panel">
        <div class="brand">
          <img src="/logo.png" alt="Hivee logo" class="brand-logo" />
          <h1>Hivee-Hub for Docker</h1>
        </div>
        <button id="refreshButton" class="ghost">Refresh</button>
      </header>

      <section class="control-grid">
        <article class="panel hivee-panel">
          <label for="pairingToken">Hivee Token</label>
          <div class="field-row">
            <input id="pairingToken" placeholder="pair_live_xxx" autocomplete="off" />
            <button id="pairButton">Connect</button>
          </div>
          <div class="status-row">
            <span id="hiveeStatusDot" class="status-dot"></span>
            <span id="hiveeStatusText">Disconnected</span>
          </div>
        </article>

        <article class="panel openclaw-panel">
          <div class="candidate-header">
            <span>OpenClaw Candidates</span>
            <button id="dockerScanButton" class="ghost">Discover</button>
          </div>
          <div id="candidateButtons" class="candidate-buttons"></div>

          <label for="openclawToken">OpenClaw Token</label>
          <div class="field-row">
            <input id="openclawToken" type="password" placeholder="Bearer token" autocomplete="off" />
            <button id="saveOpenclawConfigButton">Connect</button>
          </div>
          <div class="status-row right">
            <span id="openclawStatusDot" class="status-dot"></span>
            <span id="openclawStatusText">Disconnected</span>
          </div>
        </article>
      </section>

      <section class="logs-grid">
        <article class="panel log-panel">
          <div class="log-head">Hivee Log</div>
          <pre id="pairingResult" class="log-box"></pre>
        </article>
        <article class="panel log-panel">
          <div class="log-head">OpenClaw Log</div>
          <pre id="openclawResult" class="log-box"></pre>
        </article>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
